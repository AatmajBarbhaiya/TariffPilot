# TariffPilot — two services, one network.
#   backend : FastAPI + retrieval + baked DB   (the judged HTTP API)   :8000
#   ui      : thin Streamlit front-end -> backend                      :8501
#
# Secrets come from docker/.env (copy .env.example). Compose auto-loads that
# file for ${...} interpolation — nothing secret is baked into an image.
#
#   cd docker && cp .env.example .env && $EDITOR .env
#   docker compose up --build
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: tariffpilot-backend:latest
    environment:
      # --- LLM backend (remote; nothing baked) ---
      LLM_LOCAL_ENABLED: "${LLM_LOCAL_ENABLED:-0}"   # 1 once the AMD droplet is up
      LLM_BASE_URL: "${LLM_BASE_URL:-http://localhost:8080/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-sk-noauth}"
      LLM_MODEL: "${LLM_MODEL:-local}"
      LLM_TIMEOUT: "${LLM_TIMEOUT:-8}"               # remote 20B; keep 2 calls < 30s
      # --- Fireworks fallback ---
      FIREWORKS_API_KEY: "${FIREWORKS_API_KEY:-}"
      FIREWORKS_MODEL: "${FIREWORKS_MODEL:-accounts/fireworks/models/gpt-oss-20b}"
      FIREWORKS_TIMEOUT: "${FIREWORKS_TIMEOUT:-12}"
    ports:
      - "8000:8000"
    mem_limit: 2g
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ui
    image: tariffpilot-ui:latest
    environment:
      BACKEND_URL: "http://backend:8000"
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 512m
    restart: unless-stopped
